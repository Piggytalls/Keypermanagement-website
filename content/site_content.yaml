faq:
  eyebrow: "Frequently Asked"
  heading: "Questions Paphos property owners ask us"
  items:
    - question: "What does a property management company in Paphos actually do?"
      answer: "We look after your villa or apartment while you're away — regular inspections, key holding, cleaning, pool and garden care, maintenance coordination, mail collection and emergency response, all reported back to you with photos."
    - question: "How often will my property be inspected?"
      answer: "Inspection frequency depends on your care plan, from weekly to monthly visits. Every visit is logged with a photo report so you always know the condition of your home."
    - question: "Do you hold keys to my property?"
      answer: "Yes. Keys are held securely and only accessed by vetted members of our team for scheduled visits, maintenance, guest turnovers or emergencies."
    - question: "Can you manage my villa if I only visit a few weeks a year?"
      answer: "Absolutely — this is exactly what Keyper was built for. Most of our clients are overseas owners who need someone local they trust to look after the property year-round."
    - question: "Do you handle emergencies outside office hours?"
      answer: "Yes, our Premium plan includes 24/7 emergency response so issues like leaks, alarms or storm damage are dealt with immediately, not left until the next working day."
    - question: "Which areas of Paphos do you cover?"
      answer: "We cover Paphos town and the wider district including Peyia, Coral Bay, Tala, Polis Chrysochous, Kissonerga, Chlorakas and Emba."
    - question: "How much does property management cost in Paphos?"
      answer: "Pricing depends on the size of your property, how often you need visits, and which services you choose. Get in touch for a free, no-obligation quote tailored to your home."

